<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <style>
        body {
            position: absolute;
            width: 100%;
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: stretch;
            align-items: stretch;
        }

        #navbar {
            height: 64px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: red;
        }

        #private {
            width: 2fr;
            background-color: green;
        }

        #checkout {
            width: 1fr;
            background-color: yellow;
        }

        #content {
            display: flex;
            justify-content: stretch;
            align-items: stretch;
        }

        #footer {
            height: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: blue;
        }
    </style>
</head>
<body>
    <div id="navbar">
        <div>Home</div>
        <div>Support</div>
    </div>
    <div id="content">
        <div id="private">
            <div>Firstname Lastname</div>
        </div>
        <div id="checkout">
            <div>Input</div>
        </div>
    </div>
    <div id="footer">
        <div id="privacy">Datenschutz</div>
        <div id="impress">Impressum</div>
    </div>
</body>
</html>
