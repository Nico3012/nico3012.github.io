<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: stretch;
            align-items: stretch;
        }

        #navbar {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            height: 64px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: red;
        }

        #private {
            position: absolute;
            left: 0;
            top: 64px;
            width: 50%;
            height: calc(100% - 96px);
            background-color: green;
        }

        #checkout {
            position: absolute;
            right: 0;
            top: 64px;
            width: 50%;
            height: calc(100% - 96px);
            background-color: yellow;
        }

        #footer {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: blue;
        }
    </style>
</head>
<body>
    <div id="navbar">
        <div>Home</div>
        <div>Support</div>
    </div>
    <div id="content">
        <div id="private">
            <div>Firstname Lastname</div>
        </div>
        <div id="checkout">
            <div>Input</div>
        </div>
    </div>
    <div id="footer">
        <div id="privacy">Datenschutz</div>
        <div id="impress">Impressum</div>
    </div>
</body>
</html>
