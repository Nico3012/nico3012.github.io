<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <style>
        body {
            position: absolute;
            width: 100%;
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        #navbar {
            flex-basis: 0;
            background-color: red;
        }
        
        #content {
            flex-basis: 100%;
        }

        #private {
            background-color: green;
        }

        #checkout {
            background-color: yellow;
        }

        #footer {
            flex-basis: 0;
            background-color: blue;
        }
    </style>
</head>
<body>
    <div id="navbar">
        <div>Home</div>
        <div>Support</div>
    </div>
    <div id="content">
        <div id="private">
            <div>Firstname Lastname</div>
        </div>
        <div id="checkout">
            <div>Input</div>
        </div>
    </div>
    <div id="footer">
        <div id="privacy">Datenschutz</div>
        <div id="impress">Impressum</div>
    </div>
</body>
</html>
